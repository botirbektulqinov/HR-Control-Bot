services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hr
      POSTGRES_PASSWORD: hr
      POSTGRES_DB: hr_control
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr -d hr_control"]
      interval: 5s
      timeout: 3s
      retries: 5
    # DB faqat ichki tarmoqda (bot bilan). Serverda tashqariga ochmaymiz.
    # Lokalda psql kerak bo'lsa: `docker compose exec db psql -U hr -d hr_control`.
    restart: unless-stopped

  setup:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m scripts.seed
    restart: "no"

  bot:
    build: .
    env_file: .env
    depends_on:
      setup:
        condition: service_completed_successfully
    command: python -m app.main
    restart: unless-stopped

  api:
    build: .
    env_file: .env
    depends_on:
      setup:
        condition: service_completed_successfully
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  dashboard:
    build: ../IshON-Admin
    depends_on: [api]
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped

volumes:
  pgdata:
